<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Planet Evolution</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stars"></div>
    <div class="game-container">
        <aside class="side-panel left">
            <div class="stat-box">
                <h2 id="resource-name">Planet Resources</h2>
                <p id="resource-display">0 💧</p>
            </div>
        </aside>
        <main class="main-display">
            <div id="planet" class="planet level-1"></div>
        </main>

        <aside class="side-panel right">
            <h3>Infrastructure</h3>
            <div id="buildings-list"></div>
        </aside>

    </div>
    <script src="script.js"></script>
</body>

</html>
