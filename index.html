<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Planet Evolution</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stars"></div>
    <div class="game-layout">
        <main class="main-area">
            <div class="resource-container">
                <div id="resource-display">
                    <span id="resource-count">0</span> 
                    <span id="resource-emoji">💧</span>
                </div>
                <div class="income-display">+0/s</div>
            </div>
            <div class="planet-container">
                <div class="planet" id="planet"></div>
            </div>
        </main>
        <div class="evo-panel">
            <h3>Evolution</h3>
            <div id="next-evo-info">
                <p id="evo-name">Next: Deep Sea Life</p>
                <p id="evo-buff">Buff: Vapor Collector x2 income</p>
                <button id="buy-evo-btn" onclick="buyEvolution()">Evolve (Cost: 5000)</button>
            </div>
        </div>
        <aside class="side-panel">
            <nav class="tabs-nav">
                <button class="tab-btn active" onclick="switchTab('infra')">📦</button>
                <button class="tab-btn" onclick="switchTab('achievements')">🏆</button>
                <button class="tab-btn" onclick="switchTab('stats')">📊</button>
            </nav>
            <div class="event-log" id="event-log">
                <div class="log-entry">System initialized...</div>
            </div>
            <div id="infra-tab" class="tab-content active">
                <h3 class="panel-title">Infrastructure</h3>
                <div id="buildings-list"></div>
            </div>
            <div id="achievements-tab" class="tab-content">
                <div class="achievements-grid">
                    <div class="achievement-card" id="ach-clicks1k" data-hint="Start clicker">?</div>
                    <div class="achievement-card" id="ach-clicks10k" data-hint="Clicking machine">?</div>
                    <div class="achievement-card" id="ach-clicks100k" data-hint="Clicking legend">?</div>
                    <div class="achievement-card" id="ach-thousand" data-hint="First Thousand">?</div>
                    <div class="achievement-card" id="ach-million" data-hint="Millionaire">?</div>
                    <div class="achievement-card" id="ach-billion" data-hint="Billionaire">?</div>
                    <div class="achievement-card" id="ach-time-10min" data-hint="Spectator">?</div>
                    <div class="achievement-card" id="ach-time-1hr" data-hint="Sojourner">?</div>
                    <div class="achievement-card" id="ach-time-24hr" data-hint="Astronaut">?</div>
                    <div class="achievement-card" id="ach-evo1" data-hint="Not Empty">?</div>
                </div>
            </div>
            <div id="stats-tab" class="tab-content">
                <h3 class="panel-title">Statistics</h3>
                <div id="stats-content" class="shop-item"></div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
    <script src="classes.js"></script>
</body>

</html>
